<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- head is metadata for the source file only; the runtime ignores it -->
  </head>
  <body>
    <template>
      <style>

        #root {
          position: relative;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          background: #ffffff;
          font-family: "Inter", sans-serif;
          container-type: size;
        }

        /* ---- stage (single clip filling the frame) ---- */
        .stage {
          position: absolute;
          inset: 0;
          padding: 96px 140px 0 140px;
          box-sizing: border-box;
          display: flex;
          flex-direction: column;
        }

        /* ---- header ---- */
        .header {
          display: flex;
          flex-direction: column;
          gap: 14px;
        }
        .accent-line {
          width: 60px;
          height: 4px;
          border-radius: 2px;
          background: #ff441f;
          transform-origin: left center;
        }
        .eyebrow {
          font-family: "Poppins", sans-serif;
          font-weight: 600;
          font-size: 22px;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: #ff441f;
        }
        .title {
          font-family: "Poppins", sans-serif;
          font-weight: 600;
          font-size: 58px;
          line-height: 1.1;
          letter-spacing: -0.02em;
          color: #1a1a1a;
        }

        /* ---- chart frame ---- */
        .chart-card {
          margin-top: 56px;
          flex: 0 0 auto;
          width: 100%;
          max-width: 1640px;
          background: rgba(255, 68, 31, 0.04);
          border: 1.5px solid rgba(255, 68, 31, 0.2);
          border-radius: 14px;
          box-sizing: border-box;
          padding: 40px 56px 36px 56px;
          position: relative;
        }
        .chart-head {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 22px;
        }
        .chart-sub {
          font-family: "Poppins", sans-serif;
          font-weight: 500;
          font-size: 24px;
          color: #5a5a60;
          letter-spacing: 0.01em;
        }

        /* confidence chip */
        .conf-chip {
          display: inline-flex;
          align-items: baseline;
          gap: 8px;
          padding: 12px 24px;
          border-radius: 100px;
          background: rgba(255, 68, 31, 0.08);
          border: 1.5px solid rgba(255, 68, 31, 0.2);
        }
        .conf-label {
          font-family: "Poppins", sans-serif;
          font-weight: 500;
          font-size: 20px;
          letter-spacing: 0.05em;
          text-transform: uppercase;
          color: #5a5a60;
        }
        .conf-value {
          font-family: "Poppins", sans-serif;
          font-weight: 700;
          font-size: 30px;
          color: #ff441f;
          font-variant-numeric: tabular-nums;
        }

        /* plot area */
        .plot {
          position: relative;
          height: 360px;
          display: flex;
          align-items: flex-end;
          gap: 18px;
          padding-bottom: 2px;
          border-bottom: 2px solid rgba(26, 26, 26, 0.12);
        }
        .bar-col {
          flex: 1 1 0;
          height: 100%;
          display: flex;
          align-items: flex-end;
          justify-content: center;
        }
        .bar {
          width: 100%;
          max-width: 64px;
          border-radius: 6px 6px 0 0;
          background: #3b82f6;
          transform-origin: bottom center;
        }
        .bar.peak {
          background: #3b82f6;
        }

        /* peak marker ring */
        .peak-glow {
          position: absolute;
          border-radius: 6px 6px 0 0;
          border: 2px solid #3b82f6;
          box-sizing: border-box;
          opacity: 0;
          pointer-events: none;
        }

        /* time axis */
        .axis {
          margin-top: 16px;
          display: flex;
          gap: 18px;
        }
        .axis-tick {
          flex: 1 1 0;
          text-align: center;
          font-family: "Inter", sans-serif;
          font-weight: 500;
          font-size: 18px;
          color: #9a9aa0;
        }

        /* intensity scale row */
        .intensity {
          margin-top: 26px;
          display: flex;
          align-items: center;
          gap: 14px;
        }
        .intensity-label {
          font-family: "Poppins", sans-serif;
          font-weight: 500;
          font-size: 18px;
          color: #5a5a60;
        }
        .intensity-bar {
          display: block;
          flex: 1 1 auto;
          height: 8px;
          border-radius: 4px;
          background: linear-gradient(
            90deg,
            rgba(59, 130, 246, 0.12) 0%,
            rgba(59, 130, 246, 1) 100%
          );
          transform: scaleX(0);
          transform-origin: left center;
        }

        /* cloud + drops over the peak */
        .cloud-wrap {
          position: absolute;
          width: 130px;
          height: 110px;
          pointer-events: none;
        }
        .cloud-svg {
          width: 100%;
          height: 100%;
          overflow: visible;
        }
      </style>

      <div
        id="root"
        data-composition-id="07-step2-forecast"
        data-width="1920"
        data-height="1080"
        data-duration="7"
      >
        <div
          class="stage clip"
          id="stage"
          data-start="0"
          data-duration="7"
          data-track-index="1"
        >
          <!-- header -->
          <div class="header" id="header">
            <div class="accent-line" id="accentLine"></div>
            <div class="eyebrow">Paso 2 · Forecast</div>
            <div class="title">2 · Forecast de lluvia por zona</div>
          </div>

          <!-- chart -->
          <div class="chart-card" id="chartCard">
            <div class="chart-head">
              <div class="chart-sub">72 h · intensidad de lluvia por zona</div>
              <div class="conf-chip" id="confChip">
                <span class="conf-label">Confianza</span>
                <span class="conf-value" id="confValue">0%</span>
              </div>
            </div>

            <div class="plot" id="plot">
              <!-- 12 columns over 72h; values form a peaked curve -->
              <div class="bar-col"><div class="bar" style="height: 8%"></div></div>
              <div class="bar-col"><div class="bar" style="height: 14%"></div></div>
              <div class="bar-col"><div class="bar" style="height: 26%"></div></div>
              <div class="bar-col"><div class="bar" style="height: 42%"></div></div>
              <div class="bar-col"><div class="bar" style="height: 60%"></div></div>
              <div class="bar-col"><div class="bar" style="height: 80%"></div></div>
              <div class="bar-col">
                <div class="bar peak" id="peakBar" style="height: 100%"></div>
              </div>
              <div class="bar-col"><div class="bar" style="height: 78%"></div></div>
              <div class="bar-col"><div class="bar" style="height: 54%"></div></div>
              <div class="bar-col"><div class="bar" style="height: 34%"></div></div>
              <div class="bar-col"><div class="bar" style="height: 18%"></div></div>
              <div class="bar-col"><div class="bar" style="height: 10%"></div></div>

              <!-- peak highlight ring (positioned over peak bar at settle) -->
              <div class="peak-glow" id="peakGlow"></div>

              <!-- cloud + drops anchored over the peak -->
              <div class="cloud-wrap" id="cloudWrap">
                <svg class="cloud-svg" viewBox="0 0 130 110" xmlns="http://www.w3.org/2000/svg">
                  <path
                    id="cloudBody"
                    d="M34 64 a22 22 0 0 1 4 -43 a26 26 0 0 1 49 6 a20 20 0 0 1 7 39 z"
                    fill="none"
                    stroke="#3b82f6"
                    stroke-width="5"
                    stroke-linejoin="round"
                    stroke-linecap="round"
                  />
                  <line
                    id="drop1"
                    x1="42"
                    y1="74"
                    x2="42"
                    y2="86"
                    stroke="#3b82f6"
                    stroke-width="5"
                    stroke-linecap="round"
                  />
                  <line
                    id="drop2"
                    x1="64"
                    y1="76"
                    x2="64"
                    y2="92"
                    stroke="#3b82f6"
                    stroke-width="5"
                    stroke-linecap="round"
                  />
                  <line
                    id="drop3"
                    x1="86"
                    y1="74"
                    x2="86"
                    y2="86"
                    stroke="#3b82f6"
                    stroke-width="5"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
            </div>

            <!-- time axis (72h) -->
            <div class="axis">
              <div class="axis-tick">0 h</div>
              <div class="axis-tick"></div>
              <div class="axis-tick">12 h</div>
              <div class="axis-tick"></div>
              <div class="axis-tick">24 h</div>
              <div class="axis-tick"></div>
              <div class="axis-tick">36 h</div>
              <div class="axis-tick"></div>
              <div class="axis-tick">48 h</div>
              <div class="axis-tick"></div>
              <div class="axis-tick">60 h</div>
              <div class="axis-tick">72 h</div>
            </div>

            <!-- intensity scale none -> heavy -->
            <div class="intensity">
              <span class="intensity-label">none</span>
              <span class="intensity-bar" id="intensityBar"></span>
              <span class="intensity-label">heavy</span>
            </div>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // ---------------------------------------------------------------
        // ENTRANCE — header + chart frame slide in from the left
        // ---------------------------------------------------------------
        tl.fromTo(
          "#header",
          { x: -120, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.7, ease: "power3.out" },
          0
        );
        tl.fromTo(
          "#accentLine",
          { scaleX: 0 },
          { scaleX: 1, duration: 0.5, ease: "power3.out" },
          0.15
        );
        tl.fromTo(
          "#chartCard",
          { x: -160, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.75, ease: "power3.out" },
          0.25
        );

        // ---------------------------------------------------------------
        // DEVELOPMENT — bars grow staggered into a peaked curve
        // (stat-bars-and-fills: scaleY 0 -> 1, never height tween)
        // ---------------------------------------------------------------
        tl.fromTo(
          ".bar",
          { scaleY: 0 },
          { scaleY: 1, duration: 0.7, ease: "power3.out", stagger: 0.06 },
          1.0
        );

        // intensity scale wipes in (none -> heavy)
        tl.fromTo(
          "#intensityBar",
          { scaleX: 0 },
          { scaleX: 1, duration: 0.8, ease: "power2.out" },
          1.2
        );

        // confidence chip counts up to 82% (counting-dynamic-scale)
        // co-drive value + font-size for escalating weight; O(1) onUpdate.
        const confEl = document.getElementById("confValue");
        const confState = { value: 0, fontSize: 22 };
        tl.fromTo(
          "#confChip",
          { opacity: 0, y: -12 },
          { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" },
          1.1
        );
        tl.to(
          confState,
          {
            value: 82,
            fontSize: 30,
            duration: 1.4,
            ease: "power3.out",
            onUpdate: () => {
              confEl.textContent = Math.round(confState.value) + "%";
              confEl.style.fontSize = confState.fontSize + "px";
            },
          },
          1.3
        );

        // cloud + drops animate over the peak (svg-icon-enrichment)
        // position the cloud over the peak bar (column 7 of 12) above its top.
        // peak bar tops at plot height 100% (~360px). Place wrap above it.
        const cloudWrap = document.getElementById("cloudWrap");
        // 12 columns + 11 gaps(18px). Column center for index 6 (0-based).
        // computed at render via flex; use left % of plot.
        cloudWrap.style.left = "calc(" + (6.5 / 12) * 100 + "% - 65px)";
        cloudWrap.style.bottom = "330px";

        // cloud fades/drifts in over the peak
        tl.fromTo(
          "#cloudWrap",
          { opacity: 0, y: -24 },
          { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" },
          2.0
        );

        // drops fall in a continuous dash-like cycle (deterministic sine)
        const dropState = { p: 0 };
        const drops = [
          { el: document.getElementById("drop1"), base: 74, phase: 0 },
          { el: document.getElementById("drop2"), base: 76, phase: Math.PI * 0.66 },
          { el: document.getElementById("drop3"), base: 74, phase: Math.PI * 1.33 },
        ];
        tl.to(
          dropState,
          {
            p: Math.PI * 2 * 4, // 4 fall cycles across the remaining shot
            duration: 4.6,
            ease: "none",
            onUpdate: () => {
              drops.forEach((d) => {
                const s = (Math.sin(dropState.p + d.phase) + 1) / 2; // 0..1
                const y1 = d.base + s * 8;
                d.el.setAttribute("y1", y1);
                d.el.setAttribute("y2", y1 + 12);
                d.el.style.opacity = 0.35 + 0.65 * (1 - s);
              });
            },
          },
          2.3
        );

        // ---------------------------------------------------------------
        // SETTLE — peak highlighted + slow push (micro-camera)
        // ---------------------------------------------------------------
        // position peak glow ring over the peak bar
        const peakGlow = document.getElementById("peakGlow");
        peakGlow.style.left = "calc(" + (6.5 / 12) * 100 + "% - 32px)";
        peakGlow.style.bottom = "2px";
        peakGlow.style.width = "64px";
        peakGlow.style.height = "100%";

        tl.fromTo(
          "#peakGlow",
          { opacity: 0, scale: 1.04 },
          { opacity: 1, scale: 1, duration: 0.5, ease: "power2.out", transformOrigin: "bottom center" },
          3.4
        );
        // emphasis: peak bar brightens / nudges up slightly
        tl.fromTo(
          "#peakBar",
          { filter: "brightness(1)" },
          { filter: "brightness(1.12)", duration: 0.5, ease: "power2.inOut" },
          3.4
        );

        // slow push underneath the whole shot (micro-camera ~1.03x)
        tl.fromTo(
          "#stage",
          { scale: 1, transformOrigin: "50% 42%" },
          { scale: 1.03, duration: 7, ease: "sine.inOut" },
          0
        );

        window.__timelines["07-step2-forecast"] = tl;
      </script>
    </template>
  </body>
</html>
