<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- head is metadata for the source file only; the runtime ignores it -->
  </head>
  <body>
    <template>
      <style>
        #root {
          position: relative;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          background: #ffffff;
          font-family: "Inter", sans-serif;
          container-type: size;
        }

        /* ----- stage that holds the slow camera push ----- */
        #root .stage {
          position: absolute;
          inset: 0;
          transform-origin: 50% 46%;
          will-change: transform;
        }

        /* ----- header ----- */
        #root .header {
          position: absolute;
          top: 88px;
          left: 120px;
          will-change: transform, opacity;
        }
        #root .accent-line {
          width: 60px;
          height: 4px;
          border-radius: 2px;
          background: #ff441f;
          margin-bottom: 18px;
        }
        #root .eyebrow {
          font-family: "Poppins", sans-serif;
          font-weight: 600;
          font-size: 30px;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: #ff441f;
          margin: 0;
        }

        /* ----- source cards ----- */
        #root .card {
          position: absolute;
          left: 120px;
          width: 560px;
          box-sizing: border-box;
          padding: 34px 38px;
          background: rgba(255, 68, 31, 0.04);
          border: 1.5px solid rgba(255, 68, 31, 0.2);
          border-radius: 14px;
          will-change: transform, opacity;
        }
        #root #card-clima {
          top: 268px;
        }
        #root #card-rappi {
          top: 552px;
        }
        #root .card-title {
          font-family: "Poppins", sans-serif;
          font-weight: 600;
          font-size: 36px;
          line-height: 1.2;
          color: #1a1a1a;
          margin: 0 0 22px 0;
        }
        #root .chips {
          display: flex;
          flex-wrap: wrap;
          gap: 14px;
        }
        #root .chip {
          display: inline-block;
          font-family: "Poppins", sans-serif;
          font-weight: 500;
          font-size: 26px;
          color: #ff441f;
          background: rgba(255, 68, 31, 0.08);
          border-radius: 100px;
          padding: 12px 26px;
          transform-origin: center center;
          will-change: transform, opacity;
        }

        /* ----- central ingesta node ----- */
        #root .node {
          position: absolute;
          left: 1300px;
          top: 396px;
          width: 300px;
          height: 300px;
          box-sizing: border-box;
          border-radius: 50%;
          background: rgba(255, 68, 31, 0.04);
          border: 1.5px solid rgba(255, 68, 31, 0.2);
          display: grid;
          place-items: center;
          will-change: transform, opacity;
        }
        #root .node-inner {
          text-align: center;
        }
        #root .node-glyph {
          font-family: "Poppins", sans-serif;
          font-weight: 700;
          font-size: 40px;
          letter-spacing: 0.04em;
          color: #ff441f;
          margin: 0;
        }
        #root .node-label {
          font-family: "Poppins", sans-serif;
          font-weight: 600;
          font-size: 34px;
          color: #1a1a1a;
          margin: 8px 0 0 0;
        }

        /* ----- connector svg ----- */
        #root .wires {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          pointer-events: none;
        }
        #root .wire {
          fill: none;
          stroke: #ff441f;
          stroke-width: 4;
          stroke-linecap: round;
          opacity: 0.55;
        }
        #root .flow {
          fill: none;
          stroke: #ff441f;
          stroke-width: 5;
          stroke-linecap: round;
          stroke-dasharray: 16 26;
        }

        /* ----- footnote ----- */
        #root .footnote {
          position: absolute;
          left: 120px;
          top: 820px;
          font-family: "Poppins", sans-serif;
          font-weight: 500;
          font-size: 28px;
          letter-spacing: 0.05em;
          color: #5a5a60;
          will-change: opacity;
        }
      </style>

      <div id="root" data-composition-id="06-step1-ingesta" data-width="1920" data-height="1080" data-duration="7">
        <div
          class="stage clip"
          id="stage"
          data-start="0"
          data-duration="7"
          data-track-index="0"
        >
          <!-- connector wires sit behind cards/node -->
          <svg class="wires" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
            <!-- Clima card right edge (~680,330) curving to node left (~1300,500) -->
            <path id="wire-clima" class="wire" d="M 700 332 C 940 332, 1080 520, 1296 512" />
            <!-- Rappi card right edge (~680,640) curving up to node left (~1300,580) -->
            <path id="wire-rappi" class="wire" d="M 700 636 C 960 636, 1080 580, 1296 584" />
            <!-- dash-flow overlays following the same geometry -->
            <path id="flow-clima" class="flow" d="M 700 332 C 940 332, 1080 520, 1296 512" />
            <path id="flow-rappi" class="flow" d="M 700 636 C 960 636, 1080 580, 1296 584" />
          </svg>

          <div class="header" id="header">
            <div class="accent-line"></div>
            <p class="eyebrow">1 · Ingesta de datos</p>
          </div>

          <div class="card" id="card-clima">
            <p class="card-title">Clima (APIs externas)</p>
            <div class="chips">
              <span class="chip">OpenWeather</span>
              <span class="chip">Open-Meteo</span>
              <span class="chip">NOAA</span>
            </div>
          </div>

          <div class="card" id="card-rappi">
            <p class="card-title">Datos internos Rappi</p>
            <div class="chips">
              <span class="chip">Oferta</span>
              <span class="chip">Demanda</span>
            </div>
          </div>

          <div class="node" id="node">
            <div class="node-inner">
              <p class="node-glyph">◎</p>
              <p class="node-label">Ingesta</p>
            </div>
          </div>

          <p class="footnote" id="footnote">cada 15 min · por zona</p>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // ---------- ENTRANCE: header + two source cards slide in from left ----------
        tl.fromTo(
          "#header",
          { x: -120, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.7, ease: "power3.out" },
          0,
        );
        tl.fromTo(
          "#card-clima",
          { x: -160, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.8, ease: "power3.out" },
          0.25,
        );
        tl.fromTo(
          "#card-rappi",
          { x: -160, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.8, ease: "power3.out" },
          0.45,
        );

        // ---------- DEVELOPMENT: chips appear staggered (center-outward-expansion) ----------
        // Each chip flings from a scaled-down clustered state to its laid-out spot.
        const chips = document.querySelectorAll("#root .chip");
        const CHIP_STAGGER = 0.07;
        const CHIP_AT = 1.2;
        chips.forEach((el, i) => {
          tl.fromTo(
            el,
            { scale: 0.6, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.5, ease: "power3.out" },
            CHIP_AT + i * CHIP_STAGGER,
          );
        });

        // ---------- DEVELOPMENT: orange lines draw from both sources to the node (svg-path-draw) ----------
        const wires = [
          { sel: "#wire-clima", at: 1.9 },
          { sel: "#wire-rappi", at: 2.15 },
        ];
        const DRAW_DUR = 0.9;
        wires.forEach((w) => {
          const p = document.querySelector(w.sel);
          const len = p.getTotalLength();
          p.style.strokeDasharray = String(len);
          p.style.strokeDashoffset = String(len);
          tl.to(
            w.sel,
            { strokeDashoffset: 0, duration: DRAW_DUR, ease: "power2.out" },
            w.at,
          );
        });

        // ---------- DEVELOPMENT/SETTLE: dash-flow suggests data movement (svg-icon-enrichment) ----------
        // Flow strokes are invisible until their wire has drawn, then run a continuous
        // dash-flow to the end of the shot. Offset is an integer multiple of the dash
        // period (16 + 26 = 42) so the end frame shows no phase jump.
        const flows = [
          { sel: "#flow-clima", at: 1.9 + DRAW_DUR },
          { sel: "#flow-rappi", at: 2.15 + DRAW_DUR },
        ];
        const DASH_PERIOD = 42;
        flows.forEach((f) => {
          const fEl = document.querySelector(f.sel);
          // hide the flow until its wire is drawn, then reveal it deterministically
          tl.set(f.sel, { opacity: 0 }, 0);
          tl.set(f.sel, { opacity: 0.9 }, f.at);
          const remaining = Math.max(0.1, 7 - f.at);
          // pick a whole number of dash periods that fits the remaining time
          const cycles = Math.max(1, Math.round((remaining / DASH_PERIOD) * 220));
          const totalOffset = -DASH_PERIOD * cycles;
          tl.to(
            { o: 0 },
            {
              o: totalOffset,
              duration: remaining,
              ease: "none",
              onUpdate: function () {
                fEl.style.strokeDashoffset = String(this.targets()[0].o);
              },
            },
            f.at,
          );
        });

        // ---------- SETTLE: central node pulses once ----------
        tl.fromTo(
          "#node",
          { scale: 0.7, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.6, ease: "power3.out" },
          1.55,
        );
        tl.fromTo(
          "#node",
          { scale: 1 },
          { scale: 1.07, duration: 0.32, ease: "power2.out" },
          4.4,
        );
        tl.to("#node", { scale: 1, duration: 0.5, ease: "power2.inOut" }, 4.72);

        // footnote fades in
        tl.fromTo(
          "#footnote",
          { opacity: 0, y: 14 },
          { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" },
          2.6,
        );

        // ---------- macro camera: slow push underneath the whole shot ----------
        tl.fromTo(
          "#stage",
          { scale: 1 },
          { scale: 1.03, duration: 7, ease: "none" },
          0,
        );

        window.__timelines["06-step1-ingesta"] = tl;
      </script>
    </template>
  </body>
</html>
