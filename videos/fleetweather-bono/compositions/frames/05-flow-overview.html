<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- head is metadata only; the runtime clones <template> contents -->
  </head>
  <body>
    <template>
      <style>
        /* ---- 05-flow-overview : styles live INSIDE the template (transport rule) ---- */
        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          background: #ffffff;
          font-family: "Inter", sans-serif;
        }

        /* Header block — eyebrow + title, anchored high */
        #flow-header {
          position: absolute;
          top: 150px;
          left: 0;
          right: 0;
          text-align: center;
          opacity: 0;
        }
        #flow-eyebrow {
          font-family: "Poppins", sans-serif;
          font-weight: 600;
          font-size: 24px;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: #ff441f;
          margin-bottom: 18px;
        }
        #flow-accent-line {
          width: 60px;
          height: 4px;
          border-radius: 2px;
          background: #ff441f;
          margin: 0 auto 22px auto;
        }
        #flow-title {
          font-family: "Poppins", sans-serif;
          font-weight: 700;
          font-size: 78px;
          line-height: 1.08;
          letter-spacing: -0.02em;
          color: #1a1a1a;
        }

        /* The pipeline stage — gets the slow settle push underneath */
        #pipeline-stage {
          position: absolute;
          left: 0;
          right: 0;
          top: 0;
          bottom: 0;
          will-change: transform;
        }

        /* The drawn connector SVG sits behind the circles */
        #connector-svg {
          position: absolute;
          left: 50%;
          top: 560px;
          transform: translateX(-50%);
          width: 1320px;
          height: 8px;
          overflow: visible;
          z-index: 1;
        }
        #connector-svg path {
          fill: none;
          stroke: #ff441f;
          stroke-width: 4;
          stroke-linecap: round;
        }
        /* faint dash-flow overlay drawn on top of the solid connector */
        #connector-flow {
          stroke: #ff441f;
          stroke-width: 4;
          stroke-linecap: round;
          opacity: 0;
          stroke-dasharray: 14 22;
        }

        /* Center anchor for the four steps — items radiate from here */
        #steps-wrap {
          position: absolute;
          left: 50%;
          top: 564px;
          width: 0;
          height: 0;
          z-index: 2;
        }
        .step {
          position: absolute;
          left: 0;
          top: 0;
          width: 132px;
          height: 132px;
          margin-left: -66px;
          margin-top: -66px;
          display: grid;
          place-items: center;
          will-change: transform;
          opacity: 0;
        }
        .step-circle {
          width: 132px;
          height: 132px;
          border-radius: 50%;
          background: #ff441f;
          color: #ffffff;
          display: grid;
          place-items: center;
          font-family: "Poppins", sans-serif;
          font-weight: 700;
          font-size: 60px;
          line-height: 1;
        }
        .step-label {
          position: absolute;
          top: 158px;
          left: 50%;
          width: 280px;
          margin-left: -140px;
          text-align: center;
          font-family: "Poppins", sans-serif;
          font-weight: 500;
          font-size: 30px;
          line-height: 1.25;
          letter-spacing: -0.01em;
          color: #1a1a1a;
          opacity: 0;
          will-change: transform;
        }
      </style>

      <div id="root" data-composition-id="05-flow-overview" data-width="1920" data-height="1080">
        <!-- Single full-frame clip; all timed sub-motion runs on the one timeline -->
        <div
          class="clip"
          id="flow-clip"
          data-start="0"
          data-duration="7"
          data-track-index="1"
          style="position: absolute; inset: 0;"
        >
          <header id="flow-header">
            <div id="flow-eyebrow">FleetWeather · End-to-End</div>
            <div id="flow-accent-line"></div>
            <h1 id="flow-title">El flujo end-to-end</h1>
          </header>

          <div id="pipeline-stage">
            <!-- Connector line: 3 segments between the 4 step centers.
                 Steps sit at x = -495, -165, +165, +495 around the wrap center;
                 the SVG is 1320 wide centered, so its local x = step_x + 660. -->
            <svg id="connector-svg" viewBox="0 0 1320 8" xmlns="http://www.w3.org/2000/svg">
              <path id="seg-1" d="M 165 4 L 495 4" />
              <path id="seg-2" d="M 495 4 L 825 4" />
              <path id="seg-3" d="M 825 4 L 1155 4" />
              <path id="connector-flow" d="M 165 4 L 1155 4" />
            </svg>

            <div id="steps-wrap">
              <div class="step" id="step-1" data-target-x="-495">
                <div class="step-circle">1</div>
                <div class="step-label" id="label-1">Ingesta</div>
              </div>
              <div class="step" id="step-2" data-target-x="-165">
                <div class="step-circle">2</div>
                <div class="step-label" id="label-2">Forecast de lluvia</div>
              </div>
              <div class="step" id="step-3" data-target-x="165">
                <div class="step-circle">3</div>
                <div class="step-label" id="label-3">Cálculo del bono</div>
              </div>
              <div class="step" id="step-4" data-target-x="495">
                <div class="step-circle">4</div>
                <div class="step-label" id="label-4">Dashboard</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        /* ============================================================
           PHASE 1 — ENTRANCE (0 – 1.2s)
           Title + 4 step-circles clustered at center appear.
           ============================================================ */

        // Header rises + fades in.
        tl.fromTo(
          "#flow-header",
          { opacity: 0, y: -32 },
          { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" },
          0.1
        );

        // The four circles appear clustered at center (target offset = 0),
        // small + dim. fromTo so seek-back replays cleanly.
        const steps = gsap.utils.toArray("#step-1, #step-2, #step-3, #step-4");
        steps.forEach((el, i) => {
          tl.fromTo(
            el,
            { x: 0, scale: 0.45, opacity: 0 },
            { x: 0, scale: 0.7, opacity: 1, duration: 0.45, ease: "power2.out" },
            0.45 + i * 0.05
          );
        });

        /* ============================================================
           PHASE 2 — DEVELOPMENT (1.2 – 5.0s)
           center-outward-expansion: circles fling from center to their
           row positions. svg-path-draw: connector draws segment by
           segment. press-release-spring: each label springs in.
           ============================================================ */

        // --- center-outward-expansion ---
        const EXPAND_DUR = 1.1;     // each item's center -> target tween
        const EXPAND_STAGGER = 0.06; // within the 0.04-0.08 band
        const EXPAND_AT = 1.25;
        steps.forEach((el, i) => {
          const targetX = Number(el.dataset.targetX);
          tl.fromTo(
            el,
            { x: 0, scale: 0.7 },
            { x: targetX, scale: 1, duration: EXPAND_DUR, ease: "power3.out" },
            EXPAND_AT + i * EXPAND_STAGGER
          );
        });

        // --- svg-path-draw : measure each segment, set its dash, draw it ---
        const segs = ["#seg-1", "#seg-2", "#seg-3"].map((sel) => document.querySelector(sel));
        segs.forEach((p) => {
          const len = p.getTotalLength();
          p.style.strokeDasharray = len;
          p.style.strokeDashoffset = len;
        });
        const SEG_DRAW_DUR = 0.55;        // per-segment stroke
        const SEG_1_START = EXPAND_AT + 0.55; // begins as circles near their seats
        const SEG_STAGGER = 0.62;          // ~ continuous flow into each next circle
        const segStarts = [
          SEG_1_START,
          SEG_1_START + SEG_STAGGER,
          SEG_1_START + SEG_STAGGER * 2,
        ];
        segs.forEach((p, i) => {
          tl.to(
            p,
            { strokeDashoffset: 0, duration: SEG_DRAW_DUR, ease: "power2.out" },
            segStarts[i]
          );
        });

        // --- press-release-spring : each label springs in as its circle settles ---
        // Linear "press" dip then back.out elastic recovery (state continuity:
        // release start scale == press end scale, adjacent on the timeline).
        const labels = ["#label-1", "#label-2", "#label-3", "#label-4"].map((s) => s);
        const PRESS_SCALE = 0.9;
        const PRESS_DUR = 0.14;
        const RELEASE_DUR = 0.5;
        const BOUNCE = 1.8;
        labels.forEach((sel, i) => {
          const labelAt = EXPAND_AT + EXPAND_DUR + i * 0.12; // after the row lands
          // fade the label up from below as the press begins
          tl.fromTo(
            sel,
            { opacity: 0, y: 16, scale: PRESS_SCALE },
            { opacity: 1, y: 0, scale: PRESS_SCALE, duration: PRESS_DUR, ease: "power1.in" },
            labelAt
          );
          // spring release — overshoot back to 1.0
          tl.to(
            sel,
            { scale: 1, duration: RELEASE_DUR, ease: `back.out(${BOUNCE})` },
            labelAt + PRESS_DUR
          );
        });

        /* ============================================================
           PHASE 3 — SETTLE (5.0 – 7.0s)
           Slow camera push on the whole pipeline + faint dash-flow that
           travels along the finished connector. No exit (not final frame).
           ============================================================ */

        // Slow push (~1.03x) under the whole shot.
        tl.fromTo(
          "#pipeline-stage",
          { scale: 1, transformOrigin: "50% 52%" },
          { scale: 1.03, duration: 2.0, ease: "power2.inOut" },
          5.0
        );

        // Faint dash-flow: reveal the dashed overlay, then march the dashes
        // a finite, deterministic distance (no repeat:-1).
        tl.to("#connector-flow", { opacity: 0.5, duration: 0.5, ease: "power1.out" }, 4.9);
        tl.fromTo(
          "#connector-flow",
          { strokeDashoffset: 0 },
          { strokeDashoffset: -288, duration: 2.1, ease: "none" }, // 8 dash cycles of 36px
          4.9
        );

        window.__timelines["05-flow-overview"] = tl;
      </script>
    </template>
  </body>
</html>
