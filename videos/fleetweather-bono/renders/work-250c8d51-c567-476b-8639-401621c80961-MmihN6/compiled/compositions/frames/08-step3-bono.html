<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        #root {
          position: relative;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          background: #ffffff;
          font-family: "Inter", sans-serif;
          color: #1a1a1a;
        }
        #root * { box-sizing: border-box; }
        .camera { position: absolute; inset: 0; transform-origin: 50% 44%; will-change: transform; }

        .head { position: absolute; left: 160px; top: 110px; }
        .accent-line { width: 60px; height: 4px; border-radius: 2px; background: #ff441f; transform-origin: left center; will-change: transform; }
        .eyebrow { margin-top: 20px; font-family: "Poppins", sans-serif; font-weight: 600; font-size: 19px; letter-spacing: 0.16em; text-transform: uppercase; color: #ff441f; }
        .h2 { margin-top: 10px; font-family: "Poppins", sans-serif; font-weight: 700; font-size: 64px; letter-spacing: -0.02em; color: #1a1a1a; }

        /* equation row */
        .eq { position: absolute; left: 160px; top: 380px; display: flex; align-items: center; gap: 34px; }
        .term {
          font-family: "Poppins", sans-serif; font-weight: 600; font-size: 40px; color: #1a1a1a;
          background: rgba(255,68,31,0.04); border: 1.5px solid rgba(255,68,31,0.20);
          border-radius: 14px; padding: 26px 34px; line-height: 1.15; max-width: 360px; will-change: transform;
        }
        .term small { display: block; font-family: "Inter", sans-serif; font-weight: 400; font-size: 22px; color: #5a5a60; margin-top: 6px; }
        .op { font-family: "Poppins", sans-serif; font-weight: 700; font-size: 56px; color: #ff441f; will-change: transform; }
        .result {
          font-family: "Poppins", sans-serif; font-weight: 700; font-size: 40px; color: #ffffff;
          background: #ff441f; border-radius: 14px; padding: 26px 36px; line-height: 1.1; will-change: transform;
          box-shadow: none;
        }
        .result .amount { font-size: 60px; display: block; font-variant-numeric: tabular-nums; }
        .result small { display:block; font-family:"Inter",sans-serif; font-weight:500; font-size: 22px; opacity: 0.92; margin-top: 4px; }

        /* rule chips */
        .rules { position: absolute; left: 160px; top: 680px; display: flex; gap: 24px; }
        .chip {
          font-family: "Poppins", sans-serif; font-weight: 600; font-size: 26px; color: #1a1a1a;
          background: rgba(255,68,31,0.06); border: 1.5px solid rgba(255,68,31,0.20);
          border-radius: 100px; padding: 18px 30px; display: flex; align-items: center; gap: 14px; will-change: transform;
        }
        .chip .dot { width: 12px; height: 12px; border-radius: 50%; background: #ff441f; }
      </style>

      <div id="root" data-composition-id="08-step3-bono" data-width="1920" data-height="1080" data-duration="8">
        <div class="clip" id="stage" data-start="0" data-duration="8" data-track-index="0" style="position:absolute;inset:0;">
          <div class="camera" id="camera">
            <div class="head">
              <div class="accent-line" id="accent-line"></div>
              <div class="eyebrow" id="eyebrow">PASO 3 · EL CORAZÓN</div>
              <div class="h2" id="h2">3 · Cálculo del bono</div>
            </div>

            <div class="eq">
              <div class="term" id="t1">Brecha de oferta<small>Rappiteneros faltantes</small></div>
              <div class="op" id="op1">×</div>
              <div class="term" id="t2">Multiplicador de demanda<small>pedidos vs. día seco</small></div>
              <div class="op" id="op2">→</div>
              <div class="result" id="result">
                <span class="amount"><span id="copnum">0</span></span>
                <small>COP / entrega</small>
              </div>
            </div>

            <div class="rules">
              <div class="chip" id="c1"><span class="dot"></span>Incrementos de $500</div>
              <div class="chip" id="c2"><span class="dot"></span>Tope $3.000</div>
              <div class="chip" id="c3"><span class="dot"></span>30 min antes de la lluvia</div>
            </div>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const TOTAL = 8;

        /* ENTRANCE — header + equation left terms assemble (discrete-text-sequence feel via staggered fromTo) */
        tl.fromTo("#accent-line", { scaleX: 0, opacity: 0 }, { scaleX: 1, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.1);
        tl.fromTo("#eyebrow", { opacity: 0, x: -16 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 0.25);
        tl.fromTo("#h2", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, 0.4);

        tl.fromTo("#t1", { opacity: 0, x: -30 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 0.9);
        tl.fromTo("#op1", { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2)" }, 1.2);
        tl.fromTo("#t2", { opacity: 0, x: -30 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 1.4);

        /* DEVELOPMENT — arrow + result materialize with a count-up to 1.200 (counting-dynamic-scale) */
        tl.fromTo("#op2", { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2)" }, 1.9);
        tl.fromTo("#result", { opacity: 0, scale: 0.86 }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.6)" }, 2.1);

        const numEl = document.getElementById("copnum");
        const counter = { v: 0 };
        const fmt = (n) => "+$" + Math.round(n / 50) * 50 === 0 ? "0" : "+$" + (Math.round(n / 50) * 50).toLocaleString("es-CO");
        tl.to(counter, {
          v: 1200, duration: 1.2, ease: "power1.out",
          onUpdate: () => {
            const rounded = Math.round(counter.v / 50) * 50;
            numEl.textContent = "+$" + rounded.toLocaleString("es-CO");
            const s = 1 + (counter.v / 1200) * 0.06;
            numEl.style.display = "inline-block";
            numEl.style.transform = `scale(${s})`;
          },
        }, 2.5);
        // emphasis hit when the amount lands
        tl.fromTo("#result", { scale: 1 }, { scale: 1.04, duration: 0.18, ease: "power2.out", yoyo: true, repeat: 1 }, 3.7);

        /* rule chips slam in one by one (kinetic-beat-slam) */
        [["#c1",4.3],["#c2",4.7],["#c3",5.1]].forEach(([id,t]) => {
          tl.fromTo(id, { opacity: 0, y: -28, scale: 1.12 }, { opacity: 1, y: 0, scale: 1, duration: 0.34, ease: "power4.out" }, t);
          tl.fromTo(id, { x: 0 }, { x: 0, duration: 0.12, ease: "power2.out" }, t + 0.34);
        });

        /* SETTLE — slow push */
        tl.fromTo("#camera", { scale: 1 }, { scale: 1.03, duration: TOTAL, ease: "power1.inOut" }, 0);

        window.__timelines["08-step3-bono"] = tl;
      </script>
    </template>
  </body>
</html>
