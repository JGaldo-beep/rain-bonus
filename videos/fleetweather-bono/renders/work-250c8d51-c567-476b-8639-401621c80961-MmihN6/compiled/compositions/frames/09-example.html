<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        #root {
          position: relative;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          background: #ffffff;
          font-family: "Inter", sans-serif;
          color: #1a1a1a;
        }
        #root * { box-sizing: border-box; }
        .camera {
          position: absolute; inset: 0; transform-origin: 50% 46%; will-change: transform;
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          padding: 0 160px 140px;
        }
        .stage { position: absolute; inset: 0; }
        .eyebrow {
          font-family: "Poppins", sans-serif; font-weight: 600; font-size: 19px;
          letter-spacing: 0.18em; text-transform: uppercase; color: #ff441f; margin-bottom: 34px;
          will-change: transform;
        }
        .card {
          background: rgba(255,68,31,0.04);
          border: 1.5px solid rgba(255,68,31,0.20);
          border-radius: 28px;
          padding: 70px 96px;
          display: flex; flex-direction: column; align-items: center;
          will-change: transform;
        }
        .bell {
          display: flex; align-items: center; gap: 14px; margin-bottom: 26px;
          font-family: "Poppins", sans-serif; font-weight: 600; font-size: 24px; color: #5a5a60;
        }
        .bell .dot { width: 12px; height: 12px; border-radius: 50%; background: #ff441f; }
        .amount {
          font-family: "Poppins", sans-serif; font-weight: 700; font-size: 168px; line-height: 1;
          letter-spacing: -0.03em; color: #ff441f; font-variant-numeric: tabular-nums;
          display: inline-block; will-change: transform;
        }
        .unit { font-family: "Poppins", sans-serif; font-weight: 600; font-size: 40px; color: #1a1a1a; margin-top: 6px; }
        .meta {
          margin-top: 34px; font-family: "Inter", sans-serif; font-weight: 400; font-size: 36px; color: #5a5a60;
          display: flex; align-items: center; gap: 16px; will-change: transform;
        }
        .meta b { color: #1a1a1a; font-weight: 600; }
        .meta .drop { width: 22px; height: 22px; display: block; }
        .meta .drop svg { width: 100%; height: 100%; display: block; }
      </style>

      <div id="root" data-composition-id="09-example" data-width="1920" data-height="1080" data-duration="6">
        <div class="stage clip" id="stage" data-start="0" data-duration="6" data-track-index="0">
          <div class="camera" id="camera">
            <div class="eyebrow" id="eyebrow">LA SALIDA DEL SISTEMA</div>
            <div class="card" id="card">
              <div class="bell" id="bell"><span class="dot"></span>Bono recomendado</div>
              <div class="amount" id="amount">+$0</div>
              <div class="unit" id="unit">COP / entrega</div>
              <div class="meta" id="meta">
                <span class="drop"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2 C12 2 5 11 5 16 a7 7 0 0 0 14 0 C19 11 12 2 12 2 Z" fill="#3b82f6"/></svg></span>
                <span><b>Chapinero</b> — lluvia fuerte en <b>45 min</b></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const TOTAL = 6;

        /* ENTRANCE — notification card enters center */
        tl.fromTo("#eyebrow", { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.15);
        tl.fromTo("#card", { opacity: 0, y: 40, scale: 0.92 }, { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "back.out(1.5)" }, 0.35);
        tl.fromTo("#bell", { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.7);

        /* DEVELOPMENT — amount counts up to +$1.200 with an emphasis burst */
        const amountEl = document.getElementById("amount");
        const counter = { v: 0 };
        tl.to(counter, {
          v: 1200, duration: 1.1, ease: "power2.out",
          onUpdate: () => {
            const r = Math.round(counter.v / 50) * 50;
            amountEl.textContent = "+$" + r.toLocaleString("es-CO");
          },
        }, 0.95);
        // burst emphasis as it lands (kinetic-beat-slam)
        tl.fromTo("#amount", { scale: 0.8 }, { scale: 1, duration: 0.5, ease: "back.out(2.2)" }, 0.95);
        tl.fromTo("#amount", { scale: 1 }, { scale: 1.06, duration: 0.16, ease: "power2.out", yoyo: true, repeat: 1 }, 2.1);
        tl.fromTo("#unit", { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" }, 2.0);
        tl.fromTo("#meta", { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, 2.5);

        /* SETTLE / HOLD — number breathes (sine-wave-loop) + slow push */
        const IDLE_START = 3.2;
        const IDLE_DUR = TOTAL - IDLE_START;
        const breath = { p: 0 };
        tl.to(breath, { p: Math.PI * 2 * 1.6, duration: IDLE_DUR, ease: "none", onUpdate: () => {
          const s = 1 + Math.sin(breath.p) * 0.02;
          amountEl.style.transform = `scale(${s})`;
        }}, IDLE_START);
        tl.fromTo("#camera", { scale: 1 }, { scale: 1.03, duration: TOTAL, ease: "power1.inOut" }, 0);

        window.__timelines["09-example"] = tl;
      </script>
    </template>
  </body>
</html>
