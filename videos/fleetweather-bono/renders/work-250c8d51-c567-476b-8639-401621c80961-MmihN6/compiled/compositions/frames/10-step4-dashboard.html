<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        #root {
          position: relative; width: 1920px; height: 1080px; overflow: hidden;
          background: #ffffff; font-family: "Inter", sans-serif; color: #1a1a1a;
        }
        #root * { box-sizing: border-box; }
        .camera { position: absolute; inset: 0; transform-origin: 50% 44%; will-change: transform; }
        .wrap { position: absolute; left: 90px; top: 80px; width: 1740px; }

        /* header */
        .top { display: flex; align-items: flex-start; justify-content: space-between; }
        .eyebrow { font-family: "Poppins", sans-serif; font-weight: 600; font-size: 16px; letter-spacing: 0.16em; text-transform: uppercase; color: #ff441f; }
        .h2 { margin-top: 8px; font-family: "Poppins", sans-serif; font-weight: 700; font-size: 46px; letter-spacing: -0.02em; }
        .sub { margin-top: 6px; font-family: "Inter", sans-serif; font-size: 22px; color: #5a5a60; }
        .live { display: flex; align-items: center; gap: 10px; font-family: "Poppins", sans-serif; font-weight: 600; font-size: 18px; color: #0fa968;
          background: rgba(15,169,104,0.10); border: 1.5px solid rgba(15,169,104,0.25); border-radius: 100px; padding: 12px 20px; }
        .live .dot { width: 11px; height: 11px; border-radius: 50%; background: #0fa968; will-change: transform; }

        /* KPIs */
        .kpis { margin-top: 26px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
        .kpi { background: #f6f6f7; border: 1.5px solid rgba(26,26,32,0.08); border-radius: 16px; padding: 22px 26px; will-change: transform; }
        .kpi .lbl { font-family: "Inter", sans-serif; font-size: 18px; color: #5a5a60; }
        .kpi .val { margin-top: 8px; font-family: "Poppins", sans-serif; font-weight: 700; font-size: 46px; line-height: 1; font-variant-numeric: tabular-nums; }
        .kpi .val.accent { color: #ff441f; }

        /* main row */
        .main { margin-top: 26px; display: grid; grid-template-columns: 600px 1fr; gap: 28px; }
        .panel { background: #f6f6f7; border: 1.5px solid rgba(26,26,32,0.08); border-radius: 18px; padding: 24px 26px; }
        .panel h3 { font-family: "Poppins", sans-serif; font-weight: 600; font-size: 16px; letter-spacing: 0.06em; text-transform: uppercase; color: #5a5a60; margin: 0 0 16px; }

        /* map */
        .map { position: relative; height: 396px; background: #ffffff; border: 1.5px solid rgba(26,26,32,0.06); border-radius: 12px; overflow: hidden; }
        .zone { position: absolute; width: 26px; height: 26px; border-radius: 50%; transform: translate(-50%, -50%); will-change: transform, opacity; box-shadow: 0 0 0 6px rgba(255,255,255,0.6); }
        .zlabel { position: absolute; transform: translate(-50%, -50%); font-family: "Inter", sans-serif; font-size: 15px; color: #5a5a60; white-space: nowrap; }

        /* table */
        table { width: 100%; border-collapse: collapse; font-size: 20px; }
        thead th { text-align: left; font-family: "Poppins", sans-serif; font-weight: 600; font-size: 16px; color: #5a5a60; padding: 0 14px 14px; }
        thead th.r, tbody td.r { text-align: right; }
        tbody tr { border-top: 1px solid rgba(26,26,32,0.07); will-change: transform, opacity; }
        tbody td { padding: 16px 14px; font-family: "Inter", sans-serif; }
        tbody td.zone-c { display: flex; align-items: center; gap: 12px; font-weight: 600; font-family: "Poppins", sans-serif; }
        tbody td .pin { width: 12px; height: 12px; border-radius: 50%; }
        tbody td.bono { font-family: "Poppins", sans-serif; font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }
        .badge { font-family: "Poppins", sans-serif; font-weight: 600; font-size: 15px; border-radius: 100px; padding: 6px 14px; }
        .badge.pub { color: #5a5a60; background: rgba(26,26,32,0.06); }
        .badge.appr { color: #b9700a; background: rgba(242,169,0,0.14); }
        .muted { color: #9a9aa0; }

        /* cursor + spotlight */
        .cursor { position: absolute; width: 30px; height: 30px; z-index: 20; opacity: 0; will-change: transform, opacity; pointer-events: none; }
        .cursor svg { width: 100%; height: 100%; display: block; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25)); }
        .ripple { position: absolute; width: 30px; height: 30px; border-radius: 50%; border: 3px solid #ff441f; transform: translate(-50%, -50%) scale(0); opacity: 0; z-index: 19; pointer-events: none; will-change: transform, opacity; }
      </style>

      <div id="root" data-composition-id="10-step4-dashboard" data-width="1920" data-height="1080" data-duration="8">
        <div class="clip" id="stage" data-start="0" data-duration="8" data-track-index="0" style="position:absolute;inset:0;">
          <div class="camera" id="camera">
            <div class="wrap">
              <div class="top">
                <div>
                  <div class="eyebrow" id="eyebrow">PASO 4 · DASHBOARD</div>
                  <div class="h2">4 · Dashboard de operaciones</div>
                  <div class="sub">Bono por entrega por zona — Bogotá · forecast 72 h</div>
                </div>
                <div class="live" id="live"><span class="dot" id="livedot"></span>en vivo · WebSocket</div>
              </div>

              <div class="kpis">
                <div class="kpi" id="k1"><div class="lbl">Zonas activas</div><div class="val" data-to="12">0</div></div>
                <div class="kpi" id="k2"><div class="lbl">Con bono activo</div><div class="val" data-to="7">0</div></div>
                <div class="kpi" id="k3"><div class="lbl">Bono máximo</div><div class="val accent" data-prefix="+$" data-to="1500">0</div></div>
                <div class="kpi" id="k4"><div class="lbl">Requieren aprobación</div><div class="val" data-to="1">0</div></div>
              </div>

              <div class="main">
                <div class="panel">
                  <h3>Mapa de zonas</h3>
                  <div class="map" id="map">
                    <div class="zone z" id="zc" style="left:58%; top:36%; background:#e5402a;" data-crit="1"></div>
                    <div class="zlabel" style="left:58%; top:24%;">Chapinero</div>
                    <div class="zone z" style="left:30%; top:24%; background:#f2a900;"></div>
                    <div class="zlabel" style="left:30%; top:13%;">Usaquén</div>
                    <div class="zone z" style="left:22%; top:64%; background:#0fa968;"></div>
                    <div class="zlabel" style="left:22%; top:76%;">Suba</div>
                    <div class="zone z" style="left:48%; top:72%; background:#ff8a3d;"></div>
                    <div class="zlabel" style="left:48%; top:84%;">Kennedy</div>
                    <div class="zone z" style="left:74%; top:60%; background:#e5402a;"></div>
                    <div class="zlabel" style="left:80%; top:60%;">Centro</div>
                  </div>
                </div>

                <div class="panel">
                  <h3>Zonas por bono recomendado</h3>
                  <table>
                    <thead>
                      <tr><th>Zona</th><th>Lluvia</th><th class="r">Bono / entrega</th><th class="r">Estado</th></tr>
                    </thead>
                    <tbody>
                      <tr class="row"><td class="zone-c"><span class="pin" style="background:#e5402a;"></span>Chapinero</td><td class="muted">Lluvia fuerte</td><td class="bono" style="color:#e5402a;">+$1.200 COP</td><td class="r"><span class="badge pub">Publicado</span></td></tr>
                      <tr class="row"><td class="zone-c"><span class="pin" style="background:#f2a900;"></span>Usaquén</td><td class="muted">Llovizna</td><td class="bono" style="color:#f2a900;">+$500 COP</td><td class="r"><span class="badge appr">Aprobación manual</span></td></tr>
                      <tr class="row"><td class="zone-c"><span class="pin" style="background:#ff8a3d;"></span>Kennedy</td><td class="muted">Lluvia moderada</td><td class="bono" style="color:#ff8a3d;">+$1.000 COP</td><td class="r"><span class="badge pub">Publicado</span></td></tr>
                      <tr class="row"><td class="zone-c"><span class="pin" style="background:#e5402a;"></span>Centro</td><td class="muted">Lluvia fuerte</td><td class="bono" style="color:#e5402a;">+$1.500 COP</td><td class="r"><span class="badge pub">Publicado</span></td></tr>
                      <tr class="row"><td class="zone-c"><span class="pin" style="background:#0fa968;"></span>Suba</td><td class="muted">Sin lluvia</td><td class="bono muted">Sin bono</td><td class="r"><span class="muted">—</span></td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            <!-- cursor + ripple over the critical zone -->
            <div class="ripple" id="ripple"></div>
            <div class="cursor" id="cursor">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M4 2 L4 20 L9 15 L12.5 22 L15.5 20.5 L12 14 L19 14 Z" fill="#1a1a1a" stroke="#ffffff" stroke-width="1.2"/></svg>
            </div>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const TOTAL = 8;

        /* ENTRANCE — chrome (header + live chip) slides in from left */
        tl.fromTo("#eyebrow", { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 0.1);
        tl.fromTo(".top .h2", { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 0.2);
        tl.fromTo(".top .sub", { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 0.3);
        tl.fromTo("#live", { opacity: 0, x: 24 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 0.35);

        /* KPIs enter + count up (counting-dynamic-scale) */
        tl.fromTo(".kpi", { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out", stagger: 0.08 }, 0.55);
        document.querySelectorAll(".kpi .val").forEach((el, i) => {
          const to = parseInt(el.getAttribute("data-to"), 10);
          const prefix = el.getAttribute("data-prefix") || "";
          const o = { v: 0 };
          tl.to(o, { v: to, duration: 0.9, ease: "power1.out", onUpdate: () => {
            el.textContent = prefix + Math.round(o.v).toLocaleString("es-CO");
          }}, 0.8 + i * 0.08);
        });

        /* map panel + table panel reveal; dots color in (scale pop), rows stagger */
        tl.fromTo(".panel", { opacity: 0, y: 26 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out", stagger: 0.12 }, 1.0);
        tl.fromTo(".map .z", { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2)", stagger: 0.09 }, 1.5);
        tl.fromTo(".map .zlabel", { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out", stagger: 0.09 }, 1.7);
        tl.fromTo(".row", { opacity: 0, x: 24 }, { opacity: 1, x: 0, duration: 0.4, ease: "power3.out", stagger: 0.1 }, 1.8);

        /* DEVELOPMENT — cursor moves to critical zone (Chapinero) + click ripple (cursor-click-ripple) */
        // map is at left ~116px+26 inside wrap(left 90); compute approx pixel center of #zc.
        // wrap left=90, map panel left ~90+26=... we animate cursor in wrap-local? Use absolute over camera.
        // Chapinero dot at left 58% / top 36% of the map. Map box approx: left ≈ 90+26=116? Simplify with measured rect.
        const cursor = document.getElementById("cursor");
        const ripple = document.getElementById("ripple");
        const zc = document.getElementById("zc");
        // measure critical dot center relative to #root at setup
        const root = document.getElementById("root");
        function place() {
          const rr = root.getBoundingClientRect();
          const dr = zc.getBoundingClientRect();
          return { x: dr.left - rr.left + dr.width / 2, y: dr.top - rr.top + dr.height / 2 };
        }
        const p = place();
        gsap.set(cursor, { x: p.x + 220, y: p.y + 180 });
        gsap.set(ripple, { left: p.x, top: p.y });

        tl.to(cursor, { opacity: 1, duration: 0.3, ease: "power2.out" }, 3.2);
        tl.to(cursor, { x: p.x + 6, y: p.y + 10, duration: 0.9, ease: "power2.inOut" }, 3.3);
        // click ripple
        tl.fromTo(ripple, { scale: 0, opacity: 0.9 }, { scale: 3.2, opacity: 0, duration: 0.7, ease: "power2.out" }, 4.25);
        tl.fromTo(cursor, { scale: 1 }, { scale: 0.86, duration: 0.12, ease: "power2.out", yoyo: true, repeat: 1 }, 4.25);
        // critical zone pulses to highlight
        tl.fromTo("#zc", { scale: 1 }, { scale: 1.45, duration: 0.5, ease: "back.out(2)", yoyo: true, repeat: 1 }, 4.3);

        /* live dot heartbeat (idle) */
        const beat = { p: 0 };
        tl.to(beat, { p: Math.PI * 2 * 6, duration: TOTAL, ease: "none", onUpdate: () => {
          const s = 1 + Math.max(0, Math.sin(beat.p)) * 0.4;
          document.getElementById("livedot").style.transform = `scale(${s})`;
        }}, 0);

        /* SETTLE — slow push */
        tl.fromTo("#camera", { scale: 1 }, { scale: 1.02, duration: TOTAL, ease: "power1.inOut" }, 0);

        window.__timelines["10-step4-dashboard"] = tl;
      </script>
    </template>
  </body>
</html>
