<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <!-- head is metadata only; the runtime clones ONLY <template> contents -->
  </head>
  <body>
    <template>
      <style>
        /* ============================================================
           Frame 03 — pain-today
           Blueprint: messaging-multi-phrase (Base)
             Keep: phrases enter one after another on the same axis.
             Depart: 3 struck-through GRAY default-labels accumulating
                     in a column, eyebrow "HOY SE DECIDE" above.
           Composed effects: discrete-text-sequence (eyebrow + lead-in),
             kinetic-beat-slam (the three labels on a beat, distinct
             entrances), press-release-spring (closing settle).
           Palette from frame.md: white bg, accent #FF441F (eyebrow ONLY),
             text #1A1A1A / #5A5A60. Labels stay GRAY to signal the bad
             status quo — never orange.
           ============================================================ */
        #root {
          position: relative;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          background: #ffffff;
          font-family: "Inter", sans-serif;
          -webkit-font-smoothing: antialiased;
          text-rendering: geometricPrecision;
        }

        /* Slow macro push under the whole shot */
        .stage {
          position: absolute;
          inset: 0;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: flex-start;
          /* keep-out: all content above y ≈ 896 (83% of 1080).
             Top padding anchors the cluster high; bottom padding stays
             generous so nothing nears the cutoff. */
          padding: 232px 200px 280px;
          box-sizing: border-box;
          transform-origin: 38% 44%;
          will-change: transform;
        }

        /* — eyebrow (accent-line + cobalt/Rappi-orange label) — */
        .eyebrow-row {
          display: flex;
          align-items: center;
          gap: 28px;
          margin-bottom: 40px;
        }
        .accent-line {
          width: 60px;
          height: 4px;
          border-radius: 2px;
          background: #ff441f;
          transform-origin: left center;
          will-change: transform, opacity;
        }
        .eyebrow {
          font-family: "Poppins", sans-serif;
          font-size: 30px;
          font-weight: 600;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: #ff441f;
          white-space: pre;
          will-change: opacity;
        }
        .eyebrow-cursor {
          display: inline-block;
          width: 4px;
          height: 30px;
          margin-left: 6px;
          background: #ff441f;
          transform: translateY(5px);
          vertical-align: middle;
          will-change: opacity;
        }

        /* — lead-in headline "Hoy se decide…" (near-black) — */
        .lead {
          font-family: "Poppins", sans-serif;
          font-size: 92px;
          font-weight: 600;
          line-height: 1.08;
          letter-spacing: -0.02em;
          color: #1a1a1a;
          margin-bottom: 56px;
          white-space: pre;
          will-change: opacity, transform;
        }

        /* — the three GRAY struck-through default-labels, stacked — */
        .labels {
          display: flex;
          flex-direction: column;
          gap: 26px;
        }
        .label-row {
          display: inline-flex;
          align-items: center;
          gap: 26px;
          /* muted gray friction tone — NOT orange */
          color: #9a9aa0;
          will-change: transform, opacity, filter;
          opacity: 0;
        }
        /* struck-through icon chip (gray) */
        .label-icon {
          position: relative;
          flex: 0 0 auto;
          width: 64px;
          height: 64px;
          border-radius: 12px;
          background: rgba(90, 90, 96, 0.06);
          border: 1.5px solid rgba(90, 90, 96, 0.22);
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }
        .label-icon svg {
          width: 34px;
          height: 34px;
          display: block;
        }
        /* the diagonal strike across the icon — the "tachado" signal */
        .label-icon .strike {
          position: absolute;
          left: 8px;
          right: 8px;
          top: 50%;
          height: 3px;
          border-radius: 2px;
          background: #8a8a90;
          transform-origin: center;
          transform: translateY(-50%) rotate(-18deg);
        }
        .label-text {
          font-family: "Poppins", sans-serif;
          font-size: 70px;
          font-weight: 500;
          line-height: 1.1;
          letter-spacing: -0.01em;
          color: #5a5a60;
          /* strike-through the text too, reinforcing "this is the
             friction-laden status quo" */
          text-decoration: line-through;
          text-decoration-thickness: 4px;
          text-decoration-color: rgba(90, 90, 96, 0.55);
        }
      </style>

      <div
        id="root"
        data-composition-id="03-pain-today"
        data-width="1920"
        data-height="1080"
        data-duration="6"
      >
        <section
          class="stage clip"
          id="stage"
          data-start="0"
          data-duration="6"
          data-track-index="1"
        >
          <div class="eyebrow-row">
            <span class="accent-line" id="accent-line"></span>
            <span class="eyebrow" id="eyebrow"></span
            ><span class="eyebrow-cursor" id="eyebrow-cursor"></span>
          </div>

          <div class="lead" id="lead">Hoy se decide…</div>

          <div class="labels">
            <div class="label-row" id="lbl-1">
              <span class="label-icon" aria-hidden="true">
                <!-- hand / manual gesture -->
                <svg viewBox="0 0 24 24" fill="none" stroke="#8a8a90" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M8 13V5.5a1.5 1.5 0 0 1 3 0V12" />
                  <path d="M11 12V4a1.5 1.5 0 0 1 3 0v8" />
                  <path d="M14 12V5.5a1.5 1.5 0 0 1 3 0V12" />
                  <path d="M17 12v-1.5a1.5 1.5 0 0 1 3 0V15a6 6 0 0 1-6 6h-2a6 6 0 0 1-5.2-3l-2.3-4a1.5 1.5 0 0 1 2.6-1.5L8 13" />
                </svg>
                <span class="strike"></span>
              </span>
              <span class="label-text">Manual</span>
            </div>

            <div class="label-row" id="lbl-2">
              <span class="label-icon" aria-hidden="true">
                <!-- alert / reactive -->
                <svg viewBox="0 0 24 24" fill="none" stroke="#8a8a90" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 3l9 16H3L12 3z" />
                  <line x1="12" y1="10" x2="12" y2="14" />
                  <circle cx="12" cy="17" r="0.6" fill="#8a8a90" stroke="none" />
                </svg>
                <span class="strike"></span>
              </span>
              <span class="label-text">Reactivo</span>
            </div>

            <div class="label-row" id="lbl-3">
              <span class="label-icon" aria-hidden="true">
                <!-- map / zone -->
                <svg viewBox="0 0 24 24" fill="none" stroke="#8a8a90" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2z" />
                  <line x1="9" y1="4" x2="9" y2="18" />
                  <line x1="15" y1="6" x2="15" y2="20" />
                </svg>
                <span class="strike"></span>
              </span>
              <span class="label-text">Sin modelo por zona</span>
            </div>
          </div>
        </section>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        const DURATION = 6;

        /* ============================================================
           ENTRANCE — eyebrow assembles (discrete-text-sequence).
           The accent-line draws in, then "HOY SE DECIDE" types out as a
           discrete state sequence with a deterministic blinking cursor.
           Lead-in "Hoy se decide…" fades + lifts under it.
           ============================================================ */
        const EYEBROW_FULL = "HOY SE DECIDE";
        // discrete states: jump the string at thresholds (no per-char tween)
        const EB_SEQ = [
          { t: 0.0, text: "" },
          { t: 0.34, text: "HOY" },
          { t: 0.5, text: "HOY SE" },
          { t: 0.66, text: EYEBROW_FULL },
        ];
        function eyebrowAt(time) {
          for (let i = EB_SEQ.length - 1; i >= 0; i--) {
            if (time >= EB_SEQ[i].t) return EB_SEQ[i].text;
          }
          return "";
        }
        const eyebrowEl = document.getElementById("eyebrow");
        const ebCursorEl = document.getElementById("eyebrow-cursor");

        // accent-line draw
        tl.fromTo(
          "#accent-line",
          { scaleX: 0, opacity: 0 },
          { scaleX: 1, opacity: 1, duration: 0.42, ease: "power3.out" },
          0,
        );

        // eyebrow discrete-text reveal + deterministic blink (one driver)
        const BLINK_CYCLE = 0.62; // ~natural cursor period
        const ebDriver = { t: 0 };
        tl.to(
          ebDriver,
          {
            t: DURATION,
            duration: DURATION,
            ease: "none",
            onUpdate: () => {
              const time = ebDriver.t;
              const txt = eyebrowAt(time);
              if (eyebrowEl.textContent !== txt) eyebrowEl.textContent = txt;
              // cursor blinks while typing, then hides once the lead settles
              if (time < 0.92) {
                ebCursorEl.style.opacity =
                  time % BLINK_CYCLE < BLINK_CYCLE / 2 ? "1" : "0";
              } else {
                ebCursorEl.style.opacity = "0";
              }
            },
          },
          0,
        );

        // lead-in headline rises in just after the eyebrow lands
        tl.fromTo(
          "#lead",
          { opacity: 0, y: 26 },
          { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
          0.72,
        );

        /* ============================================================
           DEVELOPMENT — kinetic-beat-slam.
           ONE beat array drives all three gray labels. They ACCUMULATE
           in a column (the messaging-multi-phrase cadence: phrase after
           phrase on the same axis — Departed to "stack, not replace").
           Distinct entrances per label (slam / side-snap / rise+rotate),
           shared short attacks, on the same pulse.
           ============================================================ */
        const PULSE = 0.42; // sub-beat grid
        // onsets begin once the lead-in has landed (~1.25s)
        const B0 = 1.28;
        const BEATS = [B0, B0 + PULSE * 2, B0 + PULSE * 4]; // even spacing

        // 1) Manual — hard slam (scale + blur down)  → power4.out
        tl.fromTo(
          "#lbl-1",
          { opacity: 0, scale: 1.35, filter: "blur(12px)", y: 8 },
          {
            opacity: 1,
            scale: 1,
            filter: "blur(0px)",
            y: 0,
            duration: 0.5,
            ease: "power4.out",
          },
          BEATS[0],
        );

        // 2) Reactivo — side-snap from left  → expo.out
        tl.fromTo(
          "#lbl-2",
          { opacity: 0, x: -180, filter: "blur(4px)" },
          {
            opacity: 1,
            x: 0,
            filter: "blur(0px)",
            duration: 0.46,
            ease: "expo.out",
          },
          BEATS[1],
        );

        // 3) Sin modelo por zona — rise + slight rotate  → circ.out
        tl.fromTo(
          "#lbl-3",
          { opacity: 0, y: 64, rotation: 3 },
          {
            opacity: 1,
            y: 0,
            rotation: 0,
            duration: 0.54,
            ease: "circ.out",
          },
          BEATS[2],
        );

        /* ============================================================
           SETTLE — press-release-spring close on the locked stack +
           slow macro push underneath the whole shot.
           After the third label lands, the whole label column does a
           short tactile press (linear compression) then a back.out
           spring recovery — a punctuating "this is the status quo" beat.
           No exit (not the final frame).
           ============================================================ */
        const PRESS_START = BEATS[2] + 0.56;
        const PRESS_DUR = 0.12;
        const RELEASE_START = PRESS_START + PRESS_DUR; // adjacency = state continuity

        tl.to(
          ".labels",
          { scale: 0.97, duration: PRESS_DUR, ease: "power1.in" },
          PRESS_START,
        );
        tl.to(
          ".labels",
          { scale: 1, duration: 0.6, ease: "back.out(1.7)" },
          RELEASE_START,
        );

        // slow macro push (~1.03x) under the entire shot — entrance→settle
        tl.fromTo(
          "#stage",
          { scale: 1.0 },
          { scale: 1.03, duration: DURATION, ease: "power2.inOut" },
          0,
        );

        // render the discrete eyebrow at t=0 so the first frame is correct
        eyebrowEl.textContent = eyebrowAt(0);

        window.__timelines["03-pain-today"] = tl;
      </script>
    </template>
  </body>
</html>
