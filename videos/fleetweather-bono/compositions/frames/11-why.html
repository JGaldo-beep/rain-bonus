<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        #root {
          position: relative; width: 1920px; height: 1080px; overflow: hidden;
          background: #ffffff; font-family: "Inter", sans-serif; color: #1a1a1a;
        }
        #root * { box-sizing: border-box; }
        .camera { position: absolute; inset: 0; transform-origin: 50% 46%; will-change: transform; }

        .head { position: absolute; left: 0; top: 130px; width: 100%; text-align: center; }
        .eyebrow { font-family: "Poppins", sans-serif; font-weight: 600; font-size: 19px; letter-spacing: 0.18em; text-transform: uppercase; color: #ff441f; will-change: transform; }
        .title { margin-top: 12px; font-family: "Poppins", sans-serif; font-weight: 700; font-size: 56px; letter-spacing: -0.02em; color: #1a1a1a; will-change: transform; }

        .cards { position: absolute; left: 160px; top: 320px; width: 1600px; display: flex; gap: 48px; }
        .card {
          flex: 1; background: rgba(255,68,31,0.04); border: 1.5px solid rgba(255,68,31,0.20);
          border-radius: 22px; padding: 56px 52px; will-change: transform;
        }
        .num { font-family: "Poppins", sans-serif; font-weight: 700; font-size: 30px; color: #ff441f; }
        .ct { margin-top: 18px; font-family: "Poppins", sans-serif; font-weight: 700; font-size: 48px; line-height: 1.12; letter-spacing: -0.01em; color: #1a1a1a; min-height: 116px; }
        .ct .acc { color: #ff441f; }
        .cd { margin-top: 22px; font-family: "Inter", sans-serif; font-weight: 400; font-size: 28px; line-height: 1.5; color: #5a5a60; }

        /* little zone-grid motif on left card */
        .zonegrid { margin-top: 30px; display: grid; grid-template-columns: repeat(4, 46px); grid-gap: 10px; }
        .zonegrid span { width: 46px; height: 46px; border-radius: 10px; background: rgba(255,68,31,0.12); }
        .zonegrid span.on { background: #ff441f; }

        /* COP vs category motif on right card */
        .copcmp { margin-top: 30px; display: flex; align-items: center; gap: 22px; }
        .cop { font-family: "Poppins", sans-serif; font-weight: 700; font-size: 40px; color: #ffffff; background: #ff441f; border-radius: 14px; padding: 16px 26px; }
        .vs { font-family: "Inter", sans-serif; font-weight: 600; font-size: 22px; color: #9a9aa0; }
        .cat { font-family: "Poppins", sans-serif; font-weight: 600; font-size: 30px; color: #9a9aa0; text-decoration: line-through; }
      </style>

      <div id="root" data-composition-id="11-why" data-width="1920" data-height="1080" data-duration="6">
        <div class="clip" id="stage" data-start="0" data-duration="6" data-track-index="0" style="position:absolute;inset:0;">
          <div class="camera" id="camera">
            <div class="head">
              <div class="eyebrow" id="eyebrow">POR QUÉ ASÍ</div>
              <div class="title" id="title">Dos decisiones de diseño</div>
            </div>

            <div class="cards">
              <div class="card" id="cardL">
                <div class="num">01</div>
                <div class="ct">Por <span class="acc">zona</span>,<br>no por ciudad</div>
                <div class="cd">La sensibilidad a la lluvia y la elasticidad de demanda varían por zona.</div>
                <div class="zonegrid">
                  <span></span><span class="on"></span><span></span><span class="on"></span>
                  <span class="on"></span><span></span><span class="on"></span><span></span>
                </div>
              </div>
              <div class="card" id="cardR">
                <div class="num">02</div>
                <div class="ct">En <span class="acc">COP</span>,<br>no categorías</div>
                <div class="cd">Una palanca operativa accionable, no una categoría abstracta de riesgo.</div>
                <div class="copcmp">
                  <span class="cop">+$1.200</span>
                  <span class="vs">vs</span>
                  <span class="cat">"Riesgo alto"</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const TOTAL = 6;

        /* ENTRANCE — eyebrow + title, then two cards enter with slight tilt from opposite sides (split-tilt-cards) */
        tl.fromTo("#eyebrow", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.45, ease: "power3.out" }, 0.1);
        tl.fromTo("#title", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, 0.25);

        tl.fromTo("#cardL", { opacity: 0, x: -70, rotation: -4 }, { opacity: 1, x: 0, rotation: 0, duration: 0.7, ease: "power3.out" }, 0.7);
        tl.fromTo("#cardR", { opacity: 0, x: 70, rotation: 4 }, { opacity: 1, x: 0, rotation: 0, duration: 0.7, ease: "power3.out" }, 0.9);

        /* DEVELOPMENT — motifs reveal; each card closes with a small spring (press-release-spring) */
        tl.fromTo("#cardL .zonegrid span", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2)", stagger: 0.05 }, 1.6);
        tl.fromTo("#cardR .copcmp > *", { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.4, ease: "back.out(1.8)", stagger: 0.12 }, 1.8);

        tl.fromTo("#cardL", { scale: 1 }, { scale: 1.02, duration: 0.16, ease: "power2.out", yoyo: true, repeat: 1 }, 2.4);
        tl.fromTo("#cardR", { scale: 1 }, { scale: 1.02, duration: 0.16, ease: "power2.out", yoyo: true, repeat: 1 }, 2.7);

        /* SETTLE — slow push */
        tl.fromTo("#camera", { scale: 1 }, { scale: 1.03, duration: TOTAL, ease: "power1.inOut" }, 0);

        window.__timelines["11-why"] = tl;
      </script>
    </template>
  </body>
</html>
